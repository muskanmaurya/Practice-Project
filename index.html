<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immersive 3D Portfolio</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        canvas {
            display: block;
        }
        #ui-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 16px;
            max-width: 500px;
            width: 80%;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s ease;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }
        #ui-overlay.active {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }
        #ui-title {
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #ui-content {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #ddd;
            margin-bottom: 30px;
        }
        .close-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s ease;
        }
        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="crosshair"></div>
    
    <div id="ui-overlay">
        <h2 id="ui-title">Planet Name</h2>
        <div id="ui-content">Planet description goes here.</div>
        <button class="close-btn" onclick="closeOverlay()">Resume Exploration</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Scene Setup for Hyper-realism
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.0015); // Adds depth to deep space

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 30, 150);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping; // Cinematic lighting
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 400;

        const textureLoader = new THREE.TextureLoader();
const material = new THREE.MeshStandardMaterial({ 
    map: textureLoader.load('path_to_your_downloaded_image.jpg'),
    roughnessMap: textureLoader.load('path_to_roughness_map.jpg'), // For realistic light scattering
    bumpMap: textureLoader.load('path_to_bump_map.jpg'), // For mountains and valleys
    bumpScale: 0.05
});

        // 2. Fix the "Square Rocks": Create a programmatic soft circle texture for stars
        function createCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 64, 64);
            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        // 3. Dense, Smooth Starfield
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 8000;
        const starPositions = new Float32Array(starCount * 3);
        const starColors = new Float32Array(starCount * 3);
        const colorPalette = [new THREE.Color(0xffffff), new THREE.Color(0xaaaaff), new THREE.Color(0xffddaa)];

        for (let i = 0; i < starCount * 3; i += 3) {
            // Spread stars widely
            starPositions[i] = (Math.random() - 0.5) * 1000;
            starPositions[i+1] = (Math.random() - 0.5) * 1000;
            starPositions[i+2] = (Math.random() - 0.5) * 1000;

            const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
            starColors[i] = color.r;
            starColors[i+1] = color.g;
            starColors[i+2] = color.b;
        }

        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        starGeometry.setAttribute('color', new THREE.BufferAttribute(starColors, 3));

        const starMaterial = new THREE.PointsMaterial({
            size: 2,
            map: createCircleTexture(), // Applies the round glow texture
            transparent: true,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        // 4. Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.1);
        scene.add(ambientLight);
        
        // A strong point light at the center to illuminate planets realistically
        const centerLight = new THREE.PointLight(0xffddaa, 8000, 1000);
        centerLight.position.set(0, 0, 0);
        scene.add(centerLight);

        // 5. The "Black Hole" Center (Visual approximation)
        // High segment count (64, 64) removes jagged edges for perfectly smooth spheres
        const blackHoleGeo = new THREE.SphereGeometry(15, 64, 64);
        const blackHoleMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const blackHole = new THREE.Mesh(blackHoleGeo, blackHoleMat);
        scene.add(blackHole);

        // Accretion disk (glowing ring)
        const diskGeo = new THREE.RingGeometry(20, 35, 128);
        const diskMat = new THREE.MeshBasicMaterial({ 
            color: 0xff6600, 
            side: THREE.DoubleSide, 
            transparent: true, 
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });
        const accretionDisk = new THREE.Mesh(diskGeo, diskMat);
        accretionDisk.rotation.x = Math.PI / 2.2;
        scene.add(accretionDisk);

        // 6. The Planets (Data Nodes)
        const planets = [];
        
        // PRO TIP: To make this truly hyper-realistic, replace 'color' with high-res texture maps:
        // map: new THREE.TextureLoader().load('path/to/8k_earth.jpg'),
        // normalMap: new THREE.TextureLoader().load('path/to/8k_earth_normal.jpg')
        
        const portfolioData = [
            {
                name: "Introduction",
                color: 0x2266ff,
                distance: 50,
                speed: 0.002,
                size: 6,
                content: "Hi, I'm Muskan Maurya. I'm a 2025 Computer Science graduate and an entry-level software developer specializing in full-stack web applications."
            },
            {
                name: "Skills Hub",
                color: 0xff4422,
                distance: 75,
                speed: 0.0015,
                size: 8,
                content: "I specialize in the MERN stack (MongoDB, Express, React, Node.js), Data Structures and Algorithms using C++, and creating interactive 3D web experiences using Three.js and GSAP."
            },
            {
                name: "Projects",
                color: 0x22ff66,
                distance: 105,
                speed: 0.001,
                size: 7,
                content: "Featured Project: DotDone - A minimalist task management application."
            },
            {
                name: "Future Vision",
                color: 0x9922ff,
                distance: 140,
                speed: 0.0008,
                size: 9,
                content: "I am passionate about integrating emerging technologies like Generative AI and Machine Learning into scalable web architectures, with long-term goals in tech entrepreneurship."
            }
        ];

        // Create perfectly smooth planets using high segment counts
        portfolioData.forEach((data, index) => {
            const geometry = new THREE.SphereGeometry(data.size, 64, 64);
            const material = new THREE.MeshStandardMaterial({ 
                color: data.color,
                roughness: 0.6,
                metalness: 0.2
            });
            const planet = new THREE.Mesh(geometry, material);
            
            // Attach data to the object for raycasting
            planet.userData = data; 
            planet.angle = Math.random() * Math.PI * 2; // Random starting angle
            
            scene.add(planet);
            planets.push(planet);
        });

        // 7. Raycaster for Interactivity
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(planets);

            if (intersects.length > 0) {
                const clickedPlanet = intersects[0].object.userData;
                document.getElementById('ui-title').innerText = clickedPlanet.name;
                document.getElementById('ui-content').innerText = clickedPlanet.content;
                document.getElementById('ui-overlay').classList.add('active');
            }
        });

        // Global function to close overlay
        window.closeOverlay = () => {
            document.getElementById('ui-overlay').classList.remove('active');
        };

        // 8. Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            controls.update();

            // Rotate the starfield slowly
            stars.rotation.y = time * 0.02;

            // Rotate accretion disk
            accretionDisk.rotation.z = time * 0.5;

            // Orbit the planets
            planets.forEach(planet => {
                const data = planet.userData;
                planet.angle += data.speed;
                planet.position.x = Math.cos(planet.angle) * data.distance;
                planet.position.z = Math.sin(planet.angle) * data.distance;
                // Spin on its own axis
                planet.rotation.y += 0.01; 
            });

            renderer.render(scene, camera);
        }

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();

        
    </script>
</body>
</html>
